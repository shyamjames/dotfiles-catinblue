[font]
size = 12.0

[font.normal]
family = "CaskaydiaCove Nerd Font Mono"
style = "Regular"

[window]
padding = { x = 10, y = 10 }
decorations = "Full"

[colors.primary]
background = "#1e1e2e"
foreground = "#cdd6f4"

[colors.selection]
text = "#1e1e2e"
background = "#cdd6f4"

[colors.cursor]
text = "#1e1e2e"
cursor = "#cdd6f4"

[colors.normal]
black   = "#45475a"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#cba6f7"
cyan    = "#94e2d5"
white   = "#cdd6f4"

[colors.bright]
black   = "#585b70"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#cba6f7"
cyan    = "#94e2d5"
white   = "#bac2de"
